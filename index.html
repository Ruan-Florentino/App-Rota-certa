<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <link rel="icon" type="image/svg+xml" href="/logo-symbol.svg" />
    
    <!-- Primary Meta Tags -->
    <title>Right Way — Your journey starts here</title>
    <meta 
      http-equiv="Content-Security-Policy" 
      content="
        img-src 'self' 
          data: 
          blob: 
          https://images.unsplash.com 
          https://api.dicebear.com 
          https://*.googleusercontent.com
          https://lh3.googleusercontent.com
          https://firebasestorage.googleapis.com
          https://*.maptiler.com
          https://tile.openstreetmap.org
          https://ui-avatars.com;
      "
    />
    <meta name="title" content="Right Way — Your journey starts here" />
    <meta name="description" content="The definitive travel app. Plan your perfect journey, discover amazing destinations, and share your adventures with the world." />
    <meta name="keywords" content="travel, trip, itinerary, flights, hotels, destinations, right way" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#030712" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rightway.app/" />
    <meta property="og:title" content="Right Way — Your journey starts here" />
    <meta property="og:description" content="The definitive app to plan and share your travels" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://rightway.app/" />
    <meta name="twitter:title" content="Right Way — Your journey starts here" />
    <meta name="twitter:description" content="The definitive app to plan your travels" />
    <meta name="twitter:creator" content="@rightwayapp" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Right Way" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Performance: Preconnect to critical domains -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://picsum.photos" />
    <link rel="preconnect" href="https://ui-avatars.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
